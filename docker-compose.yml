version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./computer_use_demo:/app/computer_use_demo
      - ./fastapi_app.db:/app/fastapi_app.db
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.vue
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: always
